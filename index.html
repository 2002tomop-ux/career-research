.filter-btn.active { background: #534AB7; border-color: #534AB7; color: #fff; }

main { max-width: 860px; margin: 0 auto; padding: 16px 12px; }

.progress-box { background: #fff; border: 1px solid #e5e3de; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; }
.progress-box h2 { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.prog-label { font-size: 11px; color: #555; min-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prog-track { flex: 1; height: 5px; background: #f0ede8; border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
.prog-num { font-size: 11px; color: #aaa; min-width: 32px; text-align: right; }

.section { margin-bottom: 24px; }
.section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #e5e3de; }
.section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.section-name { font-size: 12px; font-weight: 600; color: #555; letter-spacing: 0.04em; }
.section-count { font-size: 11px; color: #bbb; }

.card { background: #fff; border: 1px solid #e5e3de; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; }
.card.starred { border-left: 3px solid #f0c040; }
.card-top { display: flex; gap: 10px; }
.star-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #ddd; flex-shrink: 0; padding: 0; line-height: 1; transition: color 0.15s; }
.star-btn.on { color: #f0c040; }
.card-body { flex: 1; min-width: 0; }
.cat-badge { font-size: 10px; padding: 1px 7px; border-radius: 99px; font-weight: 500; display: inline-block; margin-bottom: 4px; }
.card-name { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
.tag { font-size: 10px; padding: 1px 7px; border-radius: 99px; font-weight: 500; }
.tag-shinshu { background: #EEF0FE; color: #3C3489; }
.tag-research { background: #E1F5EE; color: #0F6E56; }
.tag-rivalry { background: #FAEEDA; color: #854F0B; }
.tag-urgent { background: #FCEBEB; color: #A32D2D; }
.tag-ok { background: #EAF3DE; color: #3B6D11; }
.memo { font-size: 12px; color: #444; line-height: 1.6; margin-bottom: 10px; }

.schedule { border-top: 1px solid #f0ede8; padding-top: 9px; margin-top: 9px; }
.sched-title { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.sched-row { display: flex; gap: 8px; margin-bottom: 4px; align-items: flex-start; }
.sched-date { font-size: 11px; font-weight: 600; color: #534AB7; min-width: 120px; white-space: nowrap; }
.sched-label { font-size: 11px; color: #555; line-height: 1.5; }
.sched-badge { font-size: 9px; padding: 1px 6px; border-radius: 99px; margin-left: 5px; vertical-align: middle; display: inline-block; }
.b-urgent { background: #FCEBEB; color: #A32D2D; }
.b-pending { background: #f0ede8; color: #999; }

.checks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.check-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; cursor: pointer; }
.check-item input { cursor: pointer; }

.links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
.link-plain { font-size: 11px; color: #534AB7; text-decoration: none; }
.link-plain:hover { text-decoration: underline; }

.save-notice { font-size: 11px; color: #aaa; text-align: right; padding: 4px 0 0; }

let state = {};
let currentFilter = 'all';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  COS.forEach(c => {
    if (!state[c.id]) state[c.id] = { starred: false, checks: {} };
    c.checks.forEach(ch => {
      if (state[c.id].checks[ch] === undefined) state[c.id].checks[ch] = false;
    });
  });
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function toggleStar(id) {
  state[id].starred = !state[id].starred;
  saveState();
  render();
}

function toggleCheck(id, ch) {
  state[id].checks[ch] = !state[id].checks[ch];
  saveState();
  renderProgress();
  const co = COS.find(c => c.id === id);
  document.getElementById('checks_' + id).innerHTML = checksHTML(co);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

function checksHTML(co) {
  return co.checks.map(ch => {
    const done = state[co.id].checks[ch];
    return `<label class="check-item"><input type="checkbox" ${done?'checked':''} onchange="toggleCheck('${co.id}','${ch.replace(/'/g,"\\'").replace(/\(/g,'\\(').replace(/\)/g,'\\)')}')"><span style="${done?'text-decoration:line-through;color:#aaa;':''}">${ch}</span></label>`;
  }).join('');
}

        <div class="card-name">${co.name}</div>
        <div class="tags">${co.tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('')}</div>
        <div class="memo">${co.memo}</div>
        <div class="checks" id="checks_${co.id}">${checksHTML(co)}</div>
        <div class="schedule">
          <div class="sched-title">スケジュール</div>
          ${co.schedule.map(s=>`<div class="sched-row"><span class="sched-date">${s.date}</span><span class="sched-label">${s.label}<span class="sched-badge ${s.badge==='urgent'?'b-urgent':'b-pending'}">${s.badge==='urgent'?'要急ぎ':'未着手'}</span></span></div>`).join('')}
        </div>
        <div class="links">
          <a class="link-plain" href="${co.url}" target="_blank">公式採用サイト →</a>
          ${co.mypage?`<a class="link-btn" href="${co.mypage}" target="_blank">マイページへ →</a>`:''}
          ${co.mynavi?`<a class="link-mynavi" href="${co.mynavi}" target="_blank">マイナビ2028</a>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function renderProgress() {
  const el = document.getElementById('progress-bars');
  if (!el) return;
  const allC = COS.flatMap(c => c.checks.map(ch => state[c.id].checks[ch]));
  const done = allC.filter(Boolean).length;
  let html = `<div class="prog-row"><span class="prog-label" style="font-weight:600;">全体</span><div class="prog-track"><div class="prog-fill" style="width:${allC.length?Math.round(done/allC.length*100):0}%;background:#534AB7;"></div></div><span class="prog-num">${done}/${allC.length}</span></div>`;
  CATS.forEach(cat => {
    const cos = COS.filter(c => c.cat === cat.id);
    const catC = cos.flatMap(c => c.checks.map(ch => state[c.id].checks[ch]));
    const catDone = catC.filter(Boolean).length;
    html += `<div class="prog-row"><span class="prog-label" style="color:${cat.color};">${cat.label}</span><div class="prog-track"><div class="prog-fill" style="width:${catC.length?Math.round(catDone/catC.length*100):0}%;background:${cat.color};"></div></div><span class="prog-num">${catDone}/${catC.length}</span></div>`;
  });
  el.innerHTML = html;
}

function render() {
  const visible = COS.filter(c => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'starred') return state[c.id].starred;
    return c.cat === currentFilter;
  });
  document.getElementById('count-label').textContent = `${visible.length}社表示中`;
  const list = document.getElementById('company-list');
  if (!visible.length) { list.innerHTML = '<div class="empty">該当する企業がありません</div>'; return; }

  if (currentFilter === 'all' || currentFilter === 'starred') {
    let html = '';
    CATS.forEach(cat => {
      const cos = visible.filter(c => c.cat === cat.id);
      if (!cos.length) return;
      html += `<div class="section"><div class="section-header"><div class="section-dot" style="background:${cat.color};"></div><span class="section-name">${cat.label}</span><span class="section-count">${cos.length}社</span></div>${cos.map(cardHTML).join('')}</div>`;
    });
    list.innerHTML = html;
  } else {
    const cat = CATS.find(ct => ct.id === currentFilter);
    list.innerHTML = `<div class="section"><div class="section-header"><div class="section-dot" style="background:${cat.color};"></div><span class="section-name">${cat.label}</span><span class="section-count">${visible.length}社</span></div>${visible.map(cardHTML).join('')}</div>`;
  }
  renderProgress();
}

loadState();
render();
</script>
</body>
</html>
