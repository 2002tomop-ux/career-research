  .card-star.on { color: #f0c040; }

  .card-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }

  .schedule-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
  .schedule-rows { display: flex; flex-direction: column; gap: 5px; }
  .schedule-row { display: flex; align-items: flex-start; gap: 10px; }
  .schedule-date { font-size: 12px; font-weight: 600; color: #534AB7; white-space: nowrap; min-width: 90px; }
  .schedule-label { font-size: 12px; color: #555; }
  .schedule-badge { font-size: 10px; padding: 1px 7px; border-radius: 99px; margin-left: 6px; vertical-align: middle; }
  .badge-done { background: #EAF3DE; color: #3B6D11; }
  .badge-urgent { background: #FCEBEB; color: #A32D2D; }
  .badge-pending { background: #f0ede8; color: #888; }

  .check-area { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .check-label { font-size: 12px; color: #888; }
  .check-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; cursor: pointer; }
  .check-item input { cursor: pointer; }

  .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

let state = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  COMPANIES.forEach(c => {
    if (!state[c.id]) state[c.id] = { starred: false, checks: {} };
    c.checks.forEach(ch => {
      if (state[c.id].checks[ch] === undefined) state[c.id].checks[ch] = false;
    });
  });
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function toggleStar(id) {
  state[id].starred = !state[id].starred;
  saveState();
  render();
}

function toggleCheck(id, ch) {
  state[id].checks[ch] = !state[id].checks[ch];
  saveState();
  renderProgress();
  document.getElementById('card-checks-' + id).innerHTML = renderChecks(id, COMPANIES.find(c => c.id === id).checks);
}

let currentFilter = 'all';
function filter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  render();
}

function badgeClass(b) {
  if (b === 'urgent') return 'badge-urgent';
  if (b === 'done') return 'badge-done';
  return 'badge-pending';
}
function badgeText(b) {
  if (b === 'urgent') return '要急ぎ';
  if (b === 'done') return '完了';
  return '未着手';
}

function renderChecks(id, checks) {
  return checks.map(ch => {
    const done = state[id].checks[ch];
    return `<label class="check-item"><input type="checkbox" ${done ? 'checked' : ''} onchange="toggleCheck('${id}','${ch}')">${ch}</label>`;
  }).join('');
}

function renderCard(c) {
  const s = state[c.id];
  const cat = CATEGORIES.find(ct => ct.id === c.cat);
  return `
  <div class="card ${s.starred ? 'starred' : ''}" id="card-${c.id}">
    <div class="card-top">
      <button class="card-star ${s.starred ? 'on' : ''}" onclick="toggleStar('${c.id}')" aria-label="お気に入り">★</button>
      <div class="card-body">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span style="font-size:10px;padding:2px 8px;border-radius:99px;background:${cat.color}18;color:${cat.color};font-weight:600;">${cat.label}</span>
        </div>
        <div class="card-name">${c.name}</div>
        <div class="card-tags">${c.tags.map(t => `<span class="tag ${t.cls}">${t.text}</span>`).join('')}</div>
        <div class="card-memo">${c.memo}</div>
        <div class="check-area" id="card-checks-${c.id}">${renderChecks(c.id, c.checks)}</div>
        <div class="schedule">
          <div class="schedule-title">スケジュール</div>
          <div class="schedule-rows">
            ${c.schedule.map(s => `
              <div class="schedule-row">
                <span class="schedule-date">${s.date}</span>
                <span class="schedule-label">${s.label}<span class="schedule-badge ${badgeClass(s.badge)}">${badgeText(s.badge)}</span></span>
              </div>
            `).join('')}
          </div>
        </div>
        <div style="margin-top:10px;display:flex;gap:14px;flex-wrap:wrap;">
          <a href="${c.url}" target="_blank" style="font-size:12px;color:#534AB7;text-decoration:none;">公式採用サイト →</a>
          ${c.mypage ? `<a href="${c.mypage}" target="_blank" style="font-size:12px;font-weight:600;color:#fff;background:#534AB7;padding:3px 12px;border-radius:99px;text-decoration:none;">マイページへ →</a>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function renderProgress() {
  const bars = document.getElementById('progress-bars');
  if (!bars) return;
  const allChecks = COMPANIES.flatMap(c => c.checks.map(ch => state[c.id].checks[ch]));
  const done = allChecks.filter(Boolean).length;
  const total = allChecks.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  const catRows = CATEGORIES.map(cat => {
    const cos = COMPANIES.filter(c => c.cat === cat.id);
    const catChecks = cos.flatMap(c => c.checks.map(ch => state[c.id].checks[ch]));
    const catDone = catChecks.filter(Boolean).length;
    const catTotal = catChecks.length;
    const catPct = catTotal > 0 ? Math.round(catDone / catTotal * 100) : 0;
    return `<div class="prog-row">
      <span class="prog-label" style="color:${cat.color};">${cat.label}</span>
      <div class="prog-track"><div class="prog-fill" style="width:${catPct}%;background:${cat.color};"></div></div>
      <span class="prog-num">${catDone}/${catTotal}</span>
    </div>`;
  }).join('');

  bars.innerHTML = `<div class="prog-row">
    <span class="prog-label" style="font-weight:600;">全体</span>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:#534AB7;"></div></div>
    <span class="prog-num">${done}/${total}</span>
  </div>` + catRows;
}

function render() {
  const list = document.getElementById('company-list');
  let visible = COMPANIES.filter(c => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'starred') return state[c.id].starred;
    return c.cat === currentFilter;
  });

  document.getElementById('count-label').textContent = `${visible.length}社表示中`;

  if (visible.length === 0) {
    list.innerHTML = '<div class="empty">該当する企業がありません</div>';
    return;
  }

  if (currentFilter === 'all' || currentFilter === 'starred') {
    let html = '';
    CATEGORIES.forEach(cat => {
      const cos = visible.filter(c => c.cat === cat.id);
      if (cos.length === 0) return;
      html += `<div class="section">
        <div class="section-header">
          <div class="section-dot" style="background:${cat.color};"></div>
          <span class="section-name">${cat.label}</span>
          <span class="section-count">${cos.length}社</span>
        </div>
        ${cos.map(renderCard).join('')}
      </div>`;
    });
    list.innerHTML = html;
  } else {
    const cat = CATEGORIES.find(ct => ct.id === currentFilter);
    list.innerHTML = `<div class="section">
      <div class="section-header">
        <div class="section-dot" style="background:${cat.color};"></div>
        <span class="section-name">${cat.label}</span>
        <span class="section-count">${visible.length}社</span>
      </div>
      ${visible.map(renderCard).join('')}
    </div>`;
  }
  renderProgress();
}

loadState();
render();
</script>
</body>
</html>
